name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: Production   # optional but good

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Build Docker from backend folder
    - name: Build Docker image
      run: docker build -t be-app ./backend

    # Save image
    - name: Save Docker image
      run: docker save be-app > be-app.tar

    # Copy to EC2
    - name: Copy to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "be-app.tar"
        target: "/home/ubuntu/"

    # Deploy
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker load < be-app.tar
          docker stop be-app || true
          docker rm be-app || true
          docker run -d \
            --name be-app \
            --env-file /home/ubuntu/.env \
            -p 80:3000 \
            --restart always \
            be-app