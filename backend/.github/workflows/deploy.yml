name: Node CI/CD

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Install Node
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # Install deps
    - name: Install dependencies
      run: npm install

    # Build TS
    - name: Build project
      run: npm run build

    # (Optional but recommended)
    - name: Run tests
      run: echo "Add tests here"

    # Build Docker image
    - name: Build Docker image
      run: docker build -t be-app .

    # Save image
    - name: Save Docker image
      run: docker save be-app > be-app.tar

    # Copy to EC2
    - name: Copy to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "be-app.tar"
        target: "/home/ubuntu/"

    # Deploy on EC2
    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker load < be-app.tar
          docker stop be-app || true
          docker rm be-app || true
          docker run -d \
            -p 80:3000 \
            --name be-app \
            --env-file /home/ubuntu/.env \
            be-app